  <script>
    // Suppress benign ResizeObserver loop warning (browser quirk, not a failure)
    // Wrap ResizeObserver callbacks in rAF to break the synchronous notification loop.
    if (window.ResizeObserver) {
      const _RO = window.ResizeObserver;
      window.ResizeObserver = class extends _RO {
        constructor(cb) {
          super((entries, observer) => {
            window.requestAnimationFrame(() => cb(entries, observer));
          });
        }
      };
    }
    const _origError = console.error;
    console.error = function(...args) {
      const msg = args[0]?.message || args[0] || '';
      if (typeof msg === 'string' && msg.includes('ResizeObserver loop')) return;
      _origError.apply(console, args);
    };
    window.addEventListener('error', (e) => {
      if (e.message && e.message.includes('ResizeObserver loop')) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);
  </script>
