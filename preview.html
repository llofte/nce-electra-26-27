        }
      };

    const _origError = console.error;
    console.error = function(...args) {
      const msg = args[0]?.message || args[0] || '';
      if (typeof msg === 'string' && msg.includes('ResizeObserver loop')) return;
      _origError.apply(console, args);
    };
    window.addEventListener('error', (e) => {

        e.preventDefault();

const D = {
  parse: (s) => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); },
  fmt: (d, opt) => d.toLocaleDateString('en-US', opt),
  dow: (d) => d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase(),
  dom: (d) => d.getDate(),
  mon: (d) => d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase(),
  days: (a, b) => Math.round((b - a) / 86400000),
  same: (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(),
  startOfWeek: (d) => { const day = d.getDay(); const x = new Date(d); x.setDate(d.getDate() - day); return x; },
  addDays: (d, n) => { const x = new Date(d); x.setDate(d.getDate() + n); return x; },
  range: (start, count) => Array.from({ length: count }, (_, i) => D.addDays(start, i)),
};

function getCompetitions(tweaks) {
  if (tweaks?.preSeason) return COMPETITIONS.map(c => ({ ...c, status: 'upcoming' }));
  return COMPETITIONS;
}
function getEffectiveToday(tweaks) {
  if (tweaks?.preSeason) return new Date(2026, 8, 1);
  return TODAY;
}
function nextComp(tweaks) {
  const today = getEffectiveToday(tweaks);
  return getCompetitions(tweaks)
    .filter(c => c.status === 'upcoming')
    .map(c => ({ ...c, daysOut: Math.max(0, D.days(today, D.parse(c.date))) }))
    .sort((a, b) => a.daysOut - b.daysOut)[0];
}
function countdownTo(targetISO, fromToday) {
  const today = fromToday || TODAY;
  const target = new Date(targetISO);
  const diff = target - today;
  const days  = Math.max(0, Math.floor(diff / 86400000));
  const hours = Math.max(0, Math.floor((diff / 3600000) % 24));
  return { days, hours };
}

  const h = String(hex).replace('#',''); const x = h.length===3?h.replace(/./g,(c)=>c+c):h.padEnd(6,'0');
  const n = parseInt(x.slice(0,6),16); if (Number.isNaN(n)) return true;
  const r=(n>>16)&255,g=(n>>8)&255,b=n&255; return r*299+g*587+b*114>148000;
}
const __TwkCheck = ({ light }) => <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light?'rgba(0,0,0,.78)':'#fff'}/></svg>;
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return <div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)}/></div>;
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o,i) => {
          const colors = Array.isArray(o)?o:[o]; const [hero,...rest]=colors; const sup=rest.slice(0,4); const on=key(o)===cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on?'1':'0'} aria-label={colors.join(', ')} style={{ background:hero }} onClick={() => onChange(o)}>
              {sup.length>0 && <span>{sup.map((c,j)=><i key={j} style={{ background:c }}/>)}</span>}
              {on && <__TwkCheck light={__twkIsLight(hero)}/>}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}
function TweakButton({ label, onClick, secondary = false }) {
  return <button type="button" className={secondary?'twk-btn secondary':'twk-btn'} onClick={onClick}>{label}</button>;
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakRadio, TweakSelect, TweakText, TweakNumber, TweakColor, TweakButton });
  </script>
  <script type="text/babel">
/* screens.jsx */

function HeroComp({ comp, daysOut, onOpen }) {
  return (
    <div className="hero-next grunge" onClick={onOpen}>
      <div className="chevron-bg"/>
      <div className="hn-content">
        <div className="hn-eyebrow">{daysOut === 0 ? 'COMPETITION DAY' : `${daysOut} ${daysOut === 1 ? 'day' : 'days'} out`}</div>

}

function HeroAgenda() {
  return (
    <div className="hero-agenda grunge">
      <div className="stripe-bg"/>
      <div className="label">Mon · Mar 2 · {ATHLETE.team}</div>
      <div className="ttl">Today: <b>Full-out</b><br/>Practice 5:30P</div>
      <div className="sub">{TEAM.location} · Lucy + 23 teammates</div>

}

function HomeScreen({ tweaks, onOpenComp, onTab }) {
  const allComps = getCompetitions(tweaks);
  const today    = getEffectiveToday(tweaks);
  const next = (() => {
    const c = allComps.filter(c => c.status === 'upcoming')
      .map(c => ({ ...c, daysOut: Math.max(0, D.days(today, D.parse(c.date))) }))
      .sort((a, b) => a.daysOut - b.daysOut)[0];
    return c || null;
  })();
  const upcoming = allComps.filter(c => c.status === 'upcoming').slice(0, 3);
  const past = allComps.filter(c => c.status === 'past').sort((a, b) => b.date.localeCompare(a.date));
  const hasPast = past.length > 0;
  const last = past[0];
  const ord = (p) => p === 1 ? 'st' : p === 2 ? 'nd' : p === 3 ? 'rd' : 'th';
  const lastPlace = last ? { ordShort: `${last.placement}${ord(last.placement)}`, of: last.of } : null;
  const seasonAvg = hasPast ? (past.reduce((s, c) => s + c.score, 0) / past.length).toFixed(2) : null;
  const totalPerfs = past.reduce((n, c) => n + (c.endDate && c.endDate !== c.date ? 2 : 1), 0);
  const startWeek = D.startOfWeek(today);
  const weekEvents = SCHEDULE.filter(e => { const d = D.parse(e.date); return d >= today && d < D.addDays(startWeek, 7); }).slice(0, 4);
  const todayDow = (() => {
    const d = new Date();
    return d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
  })();
  const todayDate = (() => {
    const d = new Date();
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
  })();

  return (
    <div className="scr">
      <div style={{ position: 'relative' }}>
        <BrandMark/>
        <div style={{ position: 'absolute', top: 10, right: 'var(--pad-x)', textAlign: 'right' }}>
          <div style={{ font: '800 11px/1 "Barlow Condensed"', letterSpacing: '.18em', color: 'var(--text-faint)', textTransform: 'uppercase' }}>{todayDow}</div>
          <div style={{ font: '800 19px/1 "Barlow Condensed"', letterSpacing: '.06em', color: 'var(--text-dim)', textTransform: 'uppercase', marginTop: 4 }}>{todayDate}</div>
        </div>
      </div>
      {next && <HeroComp comp={next} daysOut={next.daysOut} onOpen={() => onOpenComp(next.id)}/>}
      {hasPast && (
        <div className="statrow">
          <div className="stat"><div className="l">Last Result</div><div className="v"><b>{lastPlace.ordShort}</b><span style={{ fontSize:14,color:'var(--text-dim)' }}> / {lastPlace.of}</span></div></div>
          <div className="stat"><div className="l">Season Avg</div><div className="v">{seasonAvg}</div></div>
          <div className="stat"><div className="l">Performances</div><div className="v">{totalPerfs}</div></div>
        </div>
      )}
      <div className="section">
        <h2><span className="title">This Week</span><span className="more" onClick={() => onTab('calendar')} style={{ cursor:'pointer' }}>Full Calendar →</span></h2>
        <div>
          {weekEvents.map((e, i) => {
            const d = D.parse(e.date);
            return (
              <div key={i} className="day-row">
                <div className={`date ${D.same(d, TODAY) ? 'today' : ''}`}>
                  <div className="dow">{D.dow(d)}</div>
                  <div className="dom">{D.dom(d)}</div>
                </div>
                <div className="events">
                  <div className={`ev ${e.kind}`}>
                    <div className="what"><div className="ttl">{e.title}</div>{e.meta && <div className="meta">{e.meta}</div>}</div>
                    <div className="time">{e.time}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="section">
        <h2><span className="title">Upcoming Comps</span><span className="more" onClick={() => onTab('comps')} style={{ cursor:'pointer' }}>All →</span></h2>
        {upcoming.map(c => <CompCard key={c.id} comp={c} onOpen={() => onOpenComp(c.id)}/>)}
      </div>
    </div>
  );
}

function CompCard({ comp, onOpen }) {
  const d = D.parse(comp.date);
  const days = D.days(TODAY, d);
  const near = days >= 0 && days <= 7;
  return (
    <div className={`comp-card ${near ? 'near' : ''}`} onClick={onOpen}>
      <div className="date-block"><div className="mo">{D.mon(d)}</div><div className="day">{D.dom(d)}</div></div>
      <div className="info">
        <div className="name">{comp.name}</div>
        <div className="loc"><Icon.Pin s={11}/> {comp.city}{days >= 0 && days <= 30 && <> · <span style={{ color:'var(--volt)',fontWeight:700 }}>{days === 0 ? 'TODAY' : `${days}d`}</span></>}</div>
      </div>
      <div className="chev"><Icon.Chev/></div>
    </div>
  );
}

function ResultCard() {
  const past = COMPETITIONS.filter(c => c.status === 'past' && c.hasScoresheet).sort((a, b) => b.date.localeCompare(a.date));
  const c = past[0];
  if (!c) return <div className="card" style={{ padding:16,color:'var(--text-dim)',fontSize:13,textAlign:'center' }}>No results yet this season.</div>;
  const d = D.parse(c.date);
  const place = c.placement;
  const suf = place===1?'st':place===2?'nd':place===3?'rd':'th';
  let behind = null;
  if (SCORESHEET.compId === c.id && place > 1) {
    const leader = SCORESHEET.leaderboard.find(t => t.rank === 1);
    if (leader) behind = { name:leader.name,score:leader.score,gap:(leader.score-c.score).toFixed(2) };
  }
  return (
    <div className="card tint-volt" style={{ padding:16,display:'flex',alignItems:'center',gap:16 }}>
      <div style={{ textAlign:'center',flexShrink:0 }}>
        <div style={{ font:'400 50px/1 Anton',color:'var(--volt)' }}>{place}<sup style={{ fontSize:20 }}>{suf}</sup></div>
        <div className="eyebrow" style={{ marginTop:6 }}>of {c.of}</div>
      </div>
      <div style={{ flex:1,borderLeft:'1px solid var(--line)',paddingLeft:16 }}>
        <div className="eyebrow" style={{ color:'var(--gold-soft)' }}>{c.name} · {D.mon(d)} {D.dom(d)}</div>
        <div style={{ font:'700 14px/1.2 "Barlow Condensed"',textTransform:'uppercase',letterSpacing:'.04em',color:'var(--text)',marginTop:6 }}>Final score <span className="mono" style={{ color:'var(--volt)' }}>{c.score.toFixed(2)}</span></div>
        {behind && <div style={{ fontSize:11.5,color:'var(--text-dim)',marginTop:4 }}>{behind.gap} behind 1st · {behind.name}, {behind.score.toFixed(2)}</div>}
      </div>
    </div>
  );
}

function CalendarScreen({ onOpenComp }) {
  const todayIdx = React.useMemo(() => {
    for (let i = 0; i < SEASON_MONTHS.length; i++) {
      const m = SEASON_MONTHS[i];
      if (m.getFullYear()===TODAY.getFullYear()&&m.getMonth()===TODAY.getMonth()) return i;
    }
    return 0;
  }, []);
  const [activeIdx, setActiveIdx] = React.useState(todayIdx);
  const trackRef = React.useRef(null);
  const syncing = React.useRef(false);
  const byDate = React.useMemo(() => { const map={}; SCHEDULE.forEach(e=>(map[e.date]||=[]).push(e)); return map; }, []);
  React.useEffect(() => {
    const el = trackRef.current; if (!el) return;
    syncing.current = true;
    el.scrollTo({ left: activeIdx * el.clientWidth, behavior: 'instant' });
    const t = setTimeout(() => { syncing.current = false; }, 450);
    return () => clearTimeout(t);
  }, [activeIdx]);
  const onScroll = () => {
    if (syncing.current) return;
    const el = trackRef.current; if (!el) return;
    const idx = Math.round(el.scrollLeft / el.clientWidth);
    if (idx !== activeIdx) setActiveIdx(idx);
  };
  const activeMonth = SEASON_MONTHS[activeIdx];
  const canPrev = activeIdx > 0;
  const canNext = activeIdx < SEASON_MONTHS.length - 1;
  const onCurrentMonth = activeIdx === todayIdx;
  const tapCompDate = (iso) => { const cid = COMP_BY_DATE[iso]; if (cid) onOpenComp(cid); };
  return (
    <div className="scr">
      <ScreenHeader title="Season Calendar" sub="May 2026 – May 2027"/>
      <div className="cal-monthbar">
        <button className="mb-arr" onClick={() => canPrev && setActiveIdx(activeIdx-1)} disabled={!canPrev}><Icon.Chev dir="left"/></button>
        <div className="mb-name">{activeMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>
        <button className={`mb-today ${onCurrentMonth?'is-current':''}`} onClick={() => setActiveIdx(todayIdx)} disabled={onCurrentMonth}>Today</button>
        <button className="mb-arr" onClick={() => canNext && setActiveIdx(activeIdx+1)} disabled={!canNext}><Icon.Chev/></button>
      </div>
      <div className="cal-track" ref={trackRef} onScroll={onScroll}>
        {SEASON_MONTHS.map((m, i) => <div key={i} className="cal-page"><MonthGrid month={m} byDate={byDate}/></div>)}
      </div>
      <div className="cal-legend">
        <span><i className="dot comp"/> Comp</span>
        <span><i className="dot practice"/> Practice</span>
        <span><i className="dot travel"/> Travel</span>
        <span><i className="dot opengym"/> Open Gym</span>
        <span><i className="dot lucy"/> Lucy</span>
        <span><i className="dot other"/> Other</span>
      </div>
      <MonthAgenda key={activeIdx} month={activeMonth} byDate={byDate} isCurrentMonth={onCurrentMonth} onTapComp={tapCompDate}/>
    </div>
  );
}

function MonthGrid({ month, byDate }) {
  const firstOfMonth = new Date(month.getFullYear(), month.getMonth(), 1);
  const gridStart = new Date(firstOfMonth);
  gridStart.setDate(1 - firstOfMonth.getDay());
  const cells = [];
  for (let i = 0; i < 42; i++) { const d = new Date(gridStart); d.setDate(gridStart.getDate()+i); cells.push(d); }
  const _iso2 = (d) => { const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; };
  const DOT_PRIORITY = { comp:0,lucy:1,travel:2,event:3,opengym:4,practice:5 };
  return (
    <div className="month-grid">
      {['S','M','T','W','T','F','S'].map((d,i) => <div key={'h'+i} className="mg-dow">{d}</div>)}
      {cells.map((d, i) => {
        const inMonth = d.getMonth()===month.getMonth();
        const isToday = D.same(d, TODAY);
        const events = byDate[_iso2(d)] || [];
        const kinds = [...new Set(events.map(e=>e.kind))].sort((a,b)=>(DOT_PRIORITY[a]??99)-(DOT_PRIORITY[b]??99));
        return (
          <div key={i} className={`mg-cell${inMonth?'':' out'}${isToday?' today':''}`}>
            <div className="mg-dn">{d.getDate()}</div>
            <div className="mg-dots">{kinds.slice(0,4).map((k,di)=><span key={di} className={`dot ${k}`}/>)}</div>
          </div>
        );
      })}
    </div>
  );
}

function MonthAgenda({ month, byDate, isCurrentMonth, onTapComp }) {
  const firstOfMonth = new Date(month.getFullYear(), month.getMonth(), 1);
  const lastOfMonth  = new Date(month.getFullYear(), month.getMonth()+1, 0);
  const weeks = [];
  let cur = new Date(firstOfMonth);
  cur.setDate(1 - firstOfMonth.getDay());
  while (cur <= lastOfMonth) { weeks.push(new Date(cur)); cur = new Date(cur.getTime()+7*86400000); }
  const _iso2 = (d) => { const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; };
  const initOpen = React.useMemo(() => {
    const o = {};
    weeks.forEach((ws, wi) => { const we=new Date(ws); we.setDate(ws.getDate()+6); o[wi]=isCurrentMonth?(TODAY>=ws&&TODAY<=we):true; });
    return o;
  }, [month, isCurrentMonth]);
  const [open, setOpen] = React.useState(initOpen);
  const toggle = (wi) => setOpen(s => ({ ...s, [wi]: !s[wi] }));
  return (
    <>
      {weeks.map((ws, wi) => {
        const days = Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
        const we = days[6];
        const weekEvents = days.reduce((n,d)=>n+(byDate[_iso2(d)]?.length||0),0);
        const isOpen = !!open[wi];
        return (
          <div key={wi} className="section week-section">
            <h2 className="week-hdr" onClick={()=>toggle(wi)}>
              <span className="title">Week of {D.mon(ws)} {D.dom(ws)}</span>
              <span className="week-meta">
                {!isOpen && weekEvents>0 && <span className="week-count">{weekEvents} {weekEvents===1?'event':'events'}</span>}
                <Icon.Chev dir={isOpen?'up':'down'}/>
              </span>
            </h2>
            <div style={{ overflow:'hidden', maxHeight:isOpen?2000:0, transition:'max-height 0.22s ease' }}>
              {days.map((d, di) => {
                const events = byDate[_iso2(d)] || [];
                const isInMonth = d.getMonth()===month.getMonth();
                const isToday = D.same(d, TODAY);
                return (
                  <div key={di} className={`day-row ${events.length===0?'empty':''} ${!isInMonth?'out-of-month':''}`}>
                    <div className={`date ${isToday?'today':''}`}><div className="dow">{D.dow(d)}</div><div className="dom">{D.dom(d)}</div></div>
                    <div className="events">
                      {events.length===0
                        ? <span>— rest day —</span>
                        : events.map((e,i) => {
                            const isComp = e.kind==='comp';
                            return (
                              <div key={i} className={`ev ${e.kind}`} onClick={isComp?()=>onTapComp(_iso2(d)):undefined} style={{ cursor:isComp?'pointer':'default' }}>
                                <div className="what"><div className="ttl">{e.title}</div>{e.meta&&<div className="meta">{e.meta}</div>}</div>
                                {e.time && <div className="time">{e.time}</div>}
                              </div>
                            );
                          })
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </>
  );
}

function CompsScreen({ tweaks, onOpenComp }) {
  const allComps = getCompetitions(tweaks);
  const upcoming = allComps.filter(c => c.status === 'upcoming');
  const past     = allComps.filter(c => c.status === 'past');
  return (
    <div className="scr">
      <ScreenHeader title="Season Events" sub={`${TEAM.team} · ${TEAM.season}`}/>
      <div className="section">
        <h2><span className="title">Upcoming · {upcoming.length}</span><span className="more" style={{ color:'var(--text-faint)' }}>Sorted by date</span></h2>
        {upcoming.map(c => <CompCard key={c.id} comp={c} onOpen={() => onOpenComp(c.id)}/>)}
      </div>
      {past.length > 0 && (
        <div className="section">
          <h2><span className="title">Past · {past.length}</span><span className="more" style={{ color:'var(--text-faint)' }}>This season</span></h2>
          {past.map(c => (
            <div key={c.id} className="comp-card" onClick={() => onOpenComp(c.id)}>
              <div className="date-block"><div className="mo">{D.mon(D.parse(c.date))}</div><div className="day">{D.dom(D.parse(c.date))}</div></div>
              <div className="info">
                <div className="name">{c.name}</div>
                <div className="loc"><Icon.Pin s={11}/> {c.city} · <span className="mono" style={{ color:'var(--volt)' }}>{c.score}</span> · <span style={{ color:'var(--gold-soft)',fontWeight:700 }}>{c.placement===1?'1st':c.placement===2?'2nd':c.placement===3?'3rd':`${c.placement}th`}{c.of?` / ${c.of}`:''}</span></div>
              </div>
              <div className="chev"><Icon.Chev/></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

Object.assign(window, { HomeScreen, HeroComp, HeroAgenda, CompCard, ResultCard, CalendarScreen, CompsScreen });
  </script>
  <script type="text/babel">
/* detail.jsx */

function CompDetail({ compId, onBack }) {
  const comp = COMPETITIONS.find(c => c.id === compId);
  const [tab, setTab] = React.useState('overview');
  if (!comp) return null;
  const startD = D.parse(comp.date);

  return (

      {tab==='sched'    && <CompSchedule comp={comp}/>}

      {tab==='div'      && <CompDivision comp={comp}/>}

}

function CompHero({ comp, daysOut }) {
  return (
    <div style={{ margin:'0 var(--pad-x) 14px' }}>
      <div className="card grunge" style={{ padding:14,position:'relative',overflow:'hidden' }}>
        <div className="chevron-bg"/>
        <div style={{ position:'relative',zIndex:2,display:'flex',alignItems:'center',gap:12 }}>
          <div style={{ flex:1 }}>
            <div className="eyebrow" style={{ color:'var(--volt)' }}>
              {comp.status==='past'?`Final · Placed ${comp.placement}/8`:daysOut===0?'COMPETITION DAY':daysOut<0?'Past':`${daysOut} days out`}
            </div>
            <div style={{ font:'400 26px/1 Anton',textTransform:'uppercase',marginTop:6,color:'var(--text)' }}>{comp.name}</div>

              <span style={{ display:'inline-flex',alignItems:'center',gap:4 }}><Icon.Pin/> {comp.venue||comp.city}</span>

            </div>
          </div>
        </div>
      </div>

}

function CompOverview({ comp }) {
  const t = comp.travel;
  if (!t) return <div className="section" style={{ paddingTop:0 }}><div className="card empty-mini">Comp details will be released closer to the event.</div></div>;
  const perfTime  = comp.performance && new Date(comp.performance);
  const perf2Time = comp.day2Performance && new Date(comp.day2Performance);
  const awardsTime= comp.awards && new Date(comp.awards);
  const isTwoDay  = !!comp.endDate && comp.endDate !== comp.date;
  const fmtTime = (d) => d ? d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '—';
  const fmtDow  = (d) => d ? d.toLocaleDateString('en-US',{weekday:'short'}) : '';
  return (
    <>
      <div className={`kvs ${isTwoDay?'three':''}`}>
        {isTwoDay ? (
          <>
            <div className="kv"><div className="k">Day 1 · {fmtDow(D.parse(comp.date))}</div><div className="v" style={{ color:'var(--volt)' }}>{fmtTime(perfTime)}<small style={{ color:'var(--text-dim)' }}>Prelims · {comp.mat||'Mat A'}</small></div></div>
            <div className="kv"><div className="k">Day 2 · {fmtDow(D.parse(comp.endDate))}</div><div className="v" style={{ color:'var(--volt)' }}>{fmtTime(perf2Time)}<small style={{ color:'var(--text-dim)' }}>Finals · {comp.mat||'Mat A'}</small></div></div>
            <div className="kv"><div className="k">Awards · {fmtDow(D.parse(comp.endDate))}</div><div className="v">{awardsTime?fmtTime(awardsTime):'5:00pm'}<small style={{ color:'var(--text-dim)' }}>Main floor</small></div></div>
          </>
        ) : (
          <>
            <div className="kv"><div className="k">Performance</div><div className="v" style={{ color:'var(--volt)' }}>{fmtTime(perfTime)}<small style={{ color:'var(--text-dim)' }}>{fmtDow(D.parse(comp.date))} · {comp.mat||'Mat A'}</small></div></div>
            <div className="kv"><div className="k">Awards</div><div className="v">{awardsTime?fmtTime(awardsTime):'5:00pm'}<small style={{ color:'var(--text-dim)' }}>Main floor</small></div></div>
          </>
        )}

function CompDivision({ comp }) {
  if (!comp.division) return <div className="section" style={{ paddingTop:0 }}><div className="card empty-mini">Division roster becomes available ~3 days before event.</div></div>;
  const hasTwoDay = comp.division.some(t => t.slot2);
  const [day, setDay] = React.useState('day1');
  const parseMin = (s) => {
    if (!s) return 9999;
    const m = s.match(/^(\d+):(\d+)(am|pm)$/i);
    if (!m) return 9999;
    let h = parseInt(m[1]), min = parseInt(m[2]), p = m[3].toLowerCase();
    if (p === 'pm' && h !== 12) h += 12;
    if (p === 'am' && h === 12) h = 0;
    return h * 60 + min;
  };
  const sorted = [...comp.division].sort((a, b) => {
    const ta = day === 'day2' ? parseMin(a.slot2 || a.slot) : parseMin(a.slot);
    const tb = day === 'day2' ? parseMin(b.slot2 || b.slot) : parseMin(b.slot);
    return ta - tb;
  });
  return (
    <div className="section" style={{ paddingTop:0 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
        <div>
          <div style={{ font:'800 16px/1 "Barlow Condensed"', textTransform:'uppercase', letterSpacing:'.08em', color:'var(--text)' }}>{TEAM.division}</div>
          <div style={{ font:'700 12px/1 "Barlow Condensed"', textTransform:'uppercase', letterSpacing:'.16em', color:'var(--text-faint)', marginTop:5 }}>{comp.division.length} Teams</div>
        </div>
        {hasTwoDay && (
          <div style={{ display:'flex', background:'rgba(255,255,255,0.07)', border:'1px solid var(--line)', borderRadius:10, padding:2 }}>
            {['day1','day2'].map(d => (
              <button key={d} onClick={() => setDay(d)} style={{ appearance:'none', border:'none', cursor:'pointer', height:36, paddingInline:16, borderRadius:8, background:day===d?'rgba(255,255,255,0.14)':'transparent', color:day===d?'var(--text)':'var(--text-faint)', font:'800 13px/1 "Barlow Condensed"', letterSpacing:'.12em', textTransform:'uppercase' }}>
                {d === 'day1' ? 'Day 1' : 'Day 2'}
              </button>
            ))}
          </div>
        )}
      </div>
      <div className="card" style={{ padding:0 }}>
        {sorted.map((t, i) => (
          <div key={t.id||i} className={`team-row ${t.us?'us':''}`}>
            <div className="badge">{i+1}</div>
            <div className="info"><div className="nm">{t.name}</div><div className="gm">{t.gym}</div></div>
            <div className="time">{day === 'day2' ? (t.slot2 || t.slot) : t.slot}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ScoreSpark({ data }) {
  const W=320,H=96,P=18;
  const min=Math.floor(Math.min(...data.map(d=>d.y))-1);
  const max=Math.ceil(Math.max(...data.map(d=>d.y))+1);
  const x=i=>P+(i*(W-2*P))/Math.max(1,data.length-1);
  const y=v=>H-P-((v-min)/(max-min))*(H-2*P);
  const path=data.map((d,i)=>`${i===0?'M':'L'} ${x(i)} ${y(d.y)}`).join(' ');
  const area=`${path} L ${x(data.length-1)} ${H-P} L ${x(0)} ${H-P} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ display:'block' }}>
      <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--volt)" stopOpacity="0.55"/><stop offset="100%" stopColor="var(--volt)" stopOpacity="0.0"/></linearGradient></defs>
      {[0,0.5,1].map(t=><line key={t} x1={P} x2={W-P} y1={P+t*(H-2*P)} y2={P+t*(H-2*P)} stroke="rgba(255,255,255,0.06)" strokeDasharray="2 3"/>)}
      <path d={area} fill="url(#sg)"/>
      <path d={path} fill="none" stroke="var(--volt)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((d,i)=>(
        <g key={i}>
          <circle cx={x(i)} cy={y(d.y)} r="3.5" fill="var(--bg)" stroke="var(--volt)" strokeWidth="1.6"/>
          <text x={x(i)} y={H-4} fontSize="8.5" fill="rgba(245,240,227,0.55)" textAnchor="middle" fontFamily="Barlow Condensed" fontWeight="700" letterSpacing="0.08em">{d.x.toUpperCase()}</text>
          <text x={x(i)} y={y(d.y)-8} fontSize="9" fill="var(--volt)" textAnchor="middle" fontFamily="JetBrains Mono" fontWeight="700">{d.y.toFixed(1)}</text>
        </g>
      ))}
    </svg>
  );
}

        { label:'Tumbling',        ids:['st','rt','jumps'],          sectionQuote: sheet.sectionNotes?.tumbling },
        { label:'Overall Routine', ids:['rc','ft','dance','show'] },
      ].map((group, gi) => {
        const groupCats = cats.filter(c => group.ids.includes(c.id));
        if (groupCats.length === 0) return null;
        return (
          <div key={group.label} style={{ marginTop: gi > 0 ? 20 : 0 }}>
            <div style={{ display:'flex',alignItems:'center',gap:10,padding:'14px var(--pad-x) 10px' }}>
              <div style={{ width:3,alignSelf:'stretch',background:'var(--volt)',borderRadius:2,flexShrink:0 }}/>
              <div style={{ font:'400 24px/1 Anton',letterSpacing:'.02em',textTransform:'uppercase',color:'var(--text)' }}>{group.label}</div>
            </div>
            <div className="score-grid">
              {groupCats.map(c => {
                const score=c.d+(c.e||0)+(c.dod?.score||0)+(c.max?.score||0); const pct=(score/c.of)*100;
                const subScores=[
                  { name:'Difficulty',          score:c.d,         of:c.d_of    },
                  c.e   ?{ name:'Execution',            score:c.e,         of:c.e_of    }:null,
                  c.dod ?{ name:'Degree of Difficulty', score:c.dod.score, of:c.dod.of  }:null,
                  c.max ?{ name:'Maximum Difficulty',   score:c.max.score, of:c.max.of  }:null,
                ].filter(Boolean);
                const showSubs = subScores.length > 1;
                return (
                  <div key={c.id} className="cat-row">
                    <div>
                      <div className="cat-name">{c.name}</div>
                    </div>
                    <div></div>
                    <div>
                      <div className="cat-score"><span style={{ color:'var(--volt)' }}>{score.toFixed(2)}</span><span className="cat-of"> /{c.of}</span></div>
                    </div>
                    {/* full-width main bar */}
                    <div style={{ gridColumn:'1 / -1',marginTop:6,marginBottom:showSubs?0:8 }}>
                      <div className="cat-bar"><i style={{ width:pct+'%' }}/></div>
                    </div>
                    {(showSubs || !!c.notes) && (
                      <div style={{ gridColumn:'1 / -1',marginTop:10,paddingTop:6,borderTop:'1px solid var(--line)' }}>
                        {showSubs && subScores.map((item,i)=>{
                          const trackPct = item.of!=null ? (item.of/c.of)*100 : 100;
                          const fillPct  = item.of!=null ? (item.score/item.of)*100 : 100;
                          return (
                            <div key={i} style={{ padding:'7px 0' }}>
                              <div style={{ display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5 }}>
                                <div style={{ font:'800 10px/1 "Barlow Condensed"',letterSpacing:'.14em',color:'var(--text-dim)',textTransform:'uppercase' }}>{item.name}</div>
                                <div className="mono" style={{ fontSize:12 }}>
                                  <b>{item.score.toFixed(2)}</b>
                                  {item.of!=null && <span style={{ color:'var(--text-faint)',fontSize:10 }}>/{item.of}</span>}
                                </div>
                              </div>
                              <div style={{ height:4,borderRadius:99 }}>
                                <div style={{ width:trackPct+'%',height:'100%',background:'rgba(255,255,255,0.06)',borderRadius:99,overflow:'hidden',position:'relative' }}>
                                  <i style={{ position:'absolute',inset:0,width:fillPct+'%',background:'var(--gold)',borderRadius:99 }}/>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                        {c.notes && <div style={{ marginTop:showSubs?8:0,padding:'8px 10px',background:'rgba(255,255,255,0.03)',borderRadius:8,fontSize:11.5,color:'var(--text-dim)',borderLeft:'2px solid var(--gold)',whiteSpace:'pre-line' }}><span style={{ color:'var(--gold)',fontSize:13 }}>"</span>{c.notes}<span style={{ color:'var(--gold)',fontSize:13 }}>"</span></div>}
                      </div>
                    )}
                  </div>
                );
              })}
              {group.sectionQuote && (
                <div className="cat-row" style={{ cursor:'default' }}>
                  <div style={{ gridColumn:'1 / -1' }}>
                    <div className="cat-name">{group.label} Creativity</div>
                  </div>
                  <div style={{ gridColumn:'1 / -1',marginTop:8,paddingTop:8,borderTop:'1px solid var(--line)' }}>
                    <div style={{ padding:'8px 10px',background:'rgba(255,255,255,0.03)',borderRadius:8,fontSize:11.5,color:'var(--text-dim)',borderLeft:'2px solid var(--gold)',whiteSpace:'pre-line' }}>
                      <span style={{ color:'var(--gold)',fontSize:13 }}>"</span>{group.sectionQuote}<span style={{ color:'var(--gold)',fontSize:13 }}>"</span>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })}

      {dedCards.length > 0 && (
        <div style={{ marginTop: 20 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px var(--pad-x) 10px' }}>
            <div style={{ width: 3, alignSelf: 'stretch', background: '#ff5555', borderRadius: 2, flexShrink: 0 }}/>
            <div style={{ font: '400 24px/1 Anton', letterSpacing: '.02em', textTransform: 'uppercase', color: 'var(--text)' }}>Deductions</div>
          </div>
          <div style={{ padding: '0 var(--pad-x)', display: 'flex', flexDirection: 'column', gap: 8 }}>
            {dedCards.map((ded, i) => {
              const isWarn = ded.type === 'warning';
              const accent = isWarn ? '#ffb040' : '#ff5555';
              return (
                <div key={i} style={{ display:'flex', gap:12, padding:12, background: isWarn ? 'rgba(255,176,64,0.07)' : 'rgba(255,85,85,0.07)', border:`1px solid ${isWarn ? 'rgba(255,176,64,0.22)' : 'rgba(255,85,85,0.22)'}`, borderRadius:10 }}>
                  <div style={{ width:46, height:46, flexShrink:0, alignSelf:'flex-start', background: isWarn ? 'rgba(255,176,64,0.15)' : 'rgba(255,85,85,0.15)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    {isWarn
                      ? <span style={{ fontSize:20, lineHeight:1, color:accent }}>⚠</span>
                      : <span style={{ font:'700 12px/1.1 "JetBrains Mono"', color:accent, textAlign:'center' }}>−{ded.amount.toFixed(2)}</span>
                    }
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ font:'800 11px/1 "Barlow Condensed"', letterSpacing:'.14em', textTransform:'uppercase', color:accent, marginBottom:7 }}>{ded.name}</div>
                    <div style={{ padding:'7px 10px', background:'rgba(255,255,255,0.03)', borderRadius:7, fontSize:11.5, color:'var(--text-dim)', borderLeft:`2px solid ${accent}`, whiteSpace:'pre-line' }}>
                      <span style={{ color:accent, fontSize:13 }}>"</span>{ded.note}<span style={{ color:accent, fontSize:13 }}>"</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{ height: 24 }}/>
    </>
  );
}

function DivisionLeaderboard({ sheet }) {

                  )}

                    <td style={{ textAlign:'center',verticalAlign:'middle' }}>
                      <div className="mono" style={{ fontSize:12,color:t.us?'var(--volt)':'var(--text-dim)' }}>{d2Raw}</div>
                      <div style={{ height:12,display:'flex',alignItems:'center',justifyContent:'center' }}>
                        {t.deductions > 0 && <span className="mono" style={{ fontSize:9.5,color:'#ff8484' }}>−{t.deductions.toFixed(2)}</span>}
                      </div>
                    </td>
                  )}
                  {pendingDay2 ? dashCell :
                    <td className="r" style={{ paddingRight:10,verticalAlign:'middle' }}>

                      }
                    </td>

            })}
          </tbody>
        </table>

function CompareView({ sheet }) {
  const us=sheet.leaderboard.find(t=>t.us); const others=sheet.leaderboard.filter(t=>!t.us);
  const [pickId,setPick]=React.useState(others[0].name); const them=others.find(t=>t.name===pickId)||others[0];
  const [day,setDay]=React.useState('day2');
  const hasTwoDay=!!sheet.categories1;
  const pendingDay2=!!sheet.pendingDay2;
  const activeDay=pendingDay2?'day1':day;
  const cats=(hasTwoDay&&activeDay==='day1')?sheet.categories1:(sheet.categories||sheet.categories1);
  const usScoreForDay=(hasTwoDay&&activeDay==='day1')?us.score1:us.score;
  const themScoreForDay=(hasTwoDay&&activeDay==='day1')?them.score1:them.score;
  const dayTotals=(hasTwoDay&&activeDay==='day1')?sheet.totals1:(sheet.totals||sheet.totals1);
  const theirDayDed=(hasTwoDay&&activeDay==='day1')?them.deductions1:them.deductions;
  const theirDayPS=(hasTwoDay&&activeDay==='day1')?them.score1:them.score;
  const theirDayRS=(theirDayPS+theirDayDed);
  return (
    <>
      <div style={{ padding:'0 var(--pad-x) 10px' }}>
        <div className="eyebrow" style={{ marginBottom:8 }}>Compare vs</div>
        <div style={{ display:'flex',gap:6,flexWrap:'wrap' }}>
          {others.map(t=><button key={t.name} onClick={()=>setPick(t.name)} className="chip" style={{ cursor:'pointer',appearance:'none',padding:'11px 14px',background:pickId===t.name?'rgba(255,255,255,0.18)':'rgba(255,255,255,0.06)',color:pickId===t.name?'var(--text)':'var(--text-dim)',borderColor:pickId===t.name?'rgba(255,255,255,0.35)':'var(--line)' }}>{t.name}</button>)}
        </div>
      </div>
      <div className="cmp-grid">
        <div className="cmp us"><div className="label">{pendingDay2?'Day 1 ':''}Rank #{us.rank}</div><div className="nm">Electra</div><div className="sc mono">{us.score.toFixed(2)}</div></div>
        <div className="cmp"><div className="label">{pendingDay2?'Day 1 ':''}Rank #{them.rank}</div><div className="nm">{them.name}</div><div className="sc mono" style={{ color:'var(--text-dim)' }}>{them.score.toFixed(2)}</div></div>
      </div>
      <div className="section" style={{ paddingTop:18 }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12 }}>
          <div style={{ font:'800 18px/1 "Barlow Condensed"',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text)' }}>
            By Category<span style={{ font:'700 10px/1 "Barlow Condensed"',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--volt)',marginLeft:8 }}>vs {them.name}</span>
          </div>
          {hasTwoDay && !pendingDay2 && (
            <div style={{ display:'flex',background:'rgba(255,255,255,0.07)',border:'1px solid var(--line)',borderRadius:10,padding:2,flexShrink:0 }}>
              {['day1','day2'].map(d=>(
                <button key={d} onClick={()=>setDay(d)} style={{ appearance:'none',border:'none',cursor:'pointer',height:32,paddingInline:12,borderRadius:8,background:activeDay===d?'rgba(255,255,255,0.14)':'transparent',color:activeDay===d?'var(--text)':'var(--text-faint)',font:'800 11px/1 "Barlow Condensed"',letterSpacing:'.12em',textTransform:'uppercase' }}>
                  {d==='day1'?'D1':'D2'}
                </button>
              ))}
            </div>
          )}
        </div>
        {/* Day summary row — two teams */}
        <div style={{ padding:'10px 12px',background:'var(--bg-card)',border:'1px solid var(--line)',borderRadius:10,marginBottom:2 }}>
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1px 1fr',gap:0 }}>
            <div style={{ paddingRight:12 }}>
              <div style={{ font:'700 10px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--volt)',marginBottom:7 }}>Electra</div>
              <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4 }}>
                {[['RS',dayTotals.raw.toFixed(2)],['DED',dayTotals.deductions===0?'0':'−'+dayTotals.deductions.toFixed(2)],['PS',dayTotals.final.toFixed(2)]].map(([lbl,val])=>(
                  <div key={lbl}>
                    <div style={{ font:'700 8px/1 "Barlow Condensed"',letterSpacing:'.14em',textTransform:'uppercase',color:'var(--volt)',opacity:0.6 }}>{lbl}</div>
                    <div className="mono" style={{ fontSize:13,fontWeight:700,color:'var(--volt)',marginTop:2 }}>{val}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background:'var(--line)',margin:'0 0' }}/>
            <div style={{ paddingLeft:12 }}>
              <div style={{ font:'700 10px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-dim)',marginBottom:7 }}>{them.name}</div>
              <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4 }}>
                {[['RS',theirDayRS.toFixed(2)],['DED',theirDayDed===0?'0':'−'+theirDayDed.toFixed(2)],['PS',theirDayPS.toFixed(2)]].map(([lbl,val])=>(
                  <div key={lbl}>
                    <div style={{ font:'700 8px/1 "Barlow Condensed"',letterSpacing:'.14em',textTransform:'uppercase',color:'var(--text-dim)',opacity:0.6 }}>{lbl}</div>
                    <div className="mono" style={{ fontSize:13,fontWeight:700,color:'var(--text-dim)',marginTop:2 }}>{val}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div style={{ display:'flex',flexDirection:'column',gap:9,marginTop:9 }}>
          {cats.map(c=>{
            const ours=c.judges.reduce((s,j)=>s+j.s,0)/c.judges.length;
            const factor=themScoreForDay/usScoreForDay;
            const theirs=Math.min(c.of,ours*factor*(0.94+(c.id.charCodeAt(0)%12)/100));
            const oursPct=(ours/c.of)*100; const theirPct=(theirs/c.of)*100; const better=ours>=theirs;
            const theirSub=(hasTwoDay&&activeDay==='day1')?them.catSub1?.[c.id]:them.catSub?.[c.id];
            const theirDod=theirSub?.dod!=null?theirSub.dod:(c.dod?theirs*(c.dod.score/ours):0);
            const theirMax=theirSub?.max!=null?theirSub.max:(c.max?theirs*(c.max.score/ours):0);
            const theirDe=Math.max(0,theirs-theirDod-theirMax);
            const deRatio=c.d/(c.d+(c.e||0));
            const theirD=theirDe*deRatio; const theirE=c.e?theirDe*(1-deRatio):0;
            return (
              <div key={c.id} style={{ padding:'10px 12px',background:'var(--bg-card)',border:'1px solid var(--line)',borderRadius:10 }}>
                <div style={{ display:'flex',justifyContent:'space-between',alignItems:'baseline' }}>
                  <div style={{ font:'700 12px/1 "Barlow Condensed"',textTransform:'uppercase',letterSpacing:'.04em' }}>{c.name}</div>
                  <div className="mono" style={{ fontSize:11,color:better?'var(--volt)':'#ff8484' }}>{better?'+':''}{(ours-theirs).toFixed(2)}</div>
                </div>
                {/* Electra bar */}
                <div style={{ display:'grid',gridTemplateColumns:'36px 1fr 36px',gap:6,alignItems:'center',marginTop:6 }}>
                  <div className="mono" style={{ fontSize:11,color:'var(--volt)',fontWeight:700 }}>{ours.toFixed(2)}</div>
                  <div style={{ height:5,background:'rgba(255,255,255,0.06)',borderRadius:99,overflow:'hidden' }}>
                    <div style={{ height:'100%',width:oursPct+'%',background:'var(--volt)',borderRadius:99 }}/>
                  </div>
                  <div className="mono" style={{ fontSize:10.5,color:'var(--text-faint)',textAlign:'right' }}>/{c.of}</div>
                </div>
                {/* Electra legend */}
                {(c.e||c.dod) && (
                  <div style={{ display:'flex',gap:8,marginTop:3,paddingLeft:42,alignItems:'center' }}>
                    <span style={{ font:'700 9px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--volt)' }}>
                      D <b style={{ fontFamily:'"JetBrains Mono"',fontSize:9.5,color:'var(--volt)',fontWeight:700 }}>{c.d.toFixed(2)}</b>
                    </span>
                    {c.e && <span style={{ font:'700 9px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--volt)' }}>
                      E <b style={{ fontFamily:'"JetBrains Mono"',fontSize:9.5,color:'var(--volt)',fontWeight:700 }}>{c.e.toFixed(2)}</b>
                    </span>}
                    {c.dod && <span style={{ font:'700 9px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--volt)' }}>
                      DOD <b style={{ fontFamily:'"JetBrains Mono"',fontSize:9.5,color:'var(--volt)',fontWeight:700 }}>{c.dod.score.toFixed(2)}</b>
                    </span>}
                    {c.max && <span style={{ font:'700 9px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--volt)' }}>
                      MAX <b style={{ fontFamily:'"JetBrains Mono"',fontSize:9.5,color:'var(--volt)',fontWeight:700 }}>{c.max.score.toFixed(2)}</b>
                    </span>}
                  </div>
                )}
                {/* Competitor bar */}
                <div style={{ display:'grid',gridTemplateColumns:'36px 1fr 36px',gap:6,alignItems:'center',marginTop:4 }}>
                  <div className="mono" style={{ fontSize:11,color:'var(--text-dim)',fontWeight:700 }}>{theirs.toFixed(2)}</div>
                  <div style={{ height:5,background:'rgba(255,255,255,0.06)',borderRadius:99,overflow:'hidden' }}>
                    <div style={{ height:'100%',width:theirPct+'%',background:'rgba(255,255,255,0.28)',borderRadius:99 }}/>
                  </div>
                  <div className="mono" style={{ fontSize:10.5,color:'var(--text-faint)',textAlign:'right' }}>/{c.of}</div>
                </div>
                {/* Competitor legend */}
                {(c.e||c.dod) && (
                  <div style={{ display:'flex',gap:8,marginTop:3,paddingLeft:42,alignItems:'center' }}>
                    <span style={{ font:'700 9px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-dim)' }}>
                      D <b style={{ fontFamily:'"JetBrains Mono"',fontSize:9.5,color:'var(--text-dim)',fontWeight:700 }}>{theirD.toFixed(2)}</b>
                    </span>
                    {c.e && <span style={{ font:'700 9px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-dim)' }}>
                      E <b style={{ fontFamily:'"JetBrains Mono"',fontSize:9.5,color:'var(--text-dim)',fontWeight:700 }}>{theirE.toFixed(2)}</b>
                    </span>}
                    {theirDod>0 && <span style={{ font:'700 9px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-dim)' }}>
                      DOD <b style={{ fontFamily:'"JetBrains Mono"',fontSize:9.5,color:'var(--text-dim)',fontWeight:700 }}>{theirDod.toFixed(2)}</b>
                    </span>}
                    {theirMax>0 && <span style={{ font:'700 9px/1 "Barlow Condensed"',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-dim)' }}>
                      MAX <b style={{ fontFamily:'"JetBrains Mono"',fontSize:9.5,color:'var(--text-dim)',fontWeight:700 }}>{theirMax.toFixed(2)}</b>
                    </span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

  <script type="text/babel">
/* app.jsx */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "split",
  "density": "comfortable",
  "preSeason": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = React.useState({ tab: 'home' });
  const [scale, setScale] = React.useState(1);

  React.useEffect(() => {
    const recalc = () => {
      const padV = 32, padH = 24;
      const sH = (window.innerHeight - padV) / 874;
      const sW = (window.innerWidth - padH) / 402;
      setScale(Math.min(1, sH, sW));
    };
    recalc();
    window.addEventListener('resize', recalc);
    return () => window.removeEventListener('resize', recalc);
  }, []);

  React.useEffect(() => {
    document.body.dataset.palette = t.palette;
    document.body.dataset.density = t.density;
  }, [t.palette, t.density]);

  const goTab    = (tab) => setRoute({ tab });
  const openComp = (id)  => setRoute(r => ({ ...r, screen: 'compDetail', id }));
  const openScore = (id) => setRoute(r => ({ ...r, screen: 'scoresheet', id }));
  const back      = ()   => setRoute(r => ({ tab: r.tab }));

  let body;
  if (route.screen === 'compDetail') {
    body = <CompDetail compId={route.id} onBack={back}/>;
  } else if (route.screen === 'scoresheet') {
    body = <ScoresheetScreen compId={route.id} onBack={back}/>;
  } else if (route.tab === 'home') {
    body = <HomeScreen tweaks={t} onOpenComp={openComp} onTab={goTab}/>;
  } else if (route.tab === 'calendar') {
    body = <CalendarScreen onOpenComp={openComp}/>;
  } else if (route.tab === 'comps') {
    body = <CompsScreen tweaks={t} onOpenComp={openComp}/>;
  } else if (route.tab === 'results') {
    body = <ResultsScreen tweaks={t} onOpenScoresheet={openScore}/>;
  }

  return (
    <>
